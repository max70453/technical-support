<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - MegaNet</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="material-icons">wifi</i>
                <span>MegaNet</span>
            </div>
            
            <div class="login-tabs">
                <button class="login-tab active" data-tab="login" onclick="switchTab('login')">Вход</button>
                <button class="login-tab" data-tab="register" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <div id="loginForm" class="login-form">
                <div class="input-field">
                    <input type="email" id="loginEmail" required>
                    <label for="loginEmail">Email</label>
                </div>
                <div class="input-field">
                    <input type="password" id="loginPassword" required>
                    <label for="loginPassword">Пароль</label>
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Войти</button>
            </div>
            
            <div id="registerForm" class="login-form" style="display:none;">
                <div class="input-field">
                    <input type="text" id="regName" required>
                    <label for="regName">Имя</label>
                </div>
                <div class="input-field">
                    <input type="email" id="regEmail" required>
                    <label for="regEmail">Email</label>
                </div>
                <div class="input-field">
                    <input type="password" id="regPassword" required>
                    <label for="regPassword">Пароль</label>
                </div>
                <div class="input-field">
                    <input type="password" id="regPasswordConfirm" required>
                    <label for="regPasswordConfirm">Подтвердите пароль</label>
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Зарегистрироваться</button>
            </div>
            
            <div class="login-error" id="loginError" style="display:none;"></div>
        </div>
    </div>
    
    <div id="toast" style="display:none;position:fixed;bottom:30px;right:30px;background:#10b981;border-radius:12px;padding:16px 24px;color:white;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,0.2);">
        <span id="toastMessage" style="font-weight:500;">Успешно!</span>
    </div>

    <a href="#" onclick="document.getElementById('chatModal').style.display='block'; return false;" style="position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:99999;box-shadow:0 4px 20px rgba(16,185,129,0.4);">
        <i class="material-icons" style="color:white;font-size:24px;">chat</i>
    </a>

    <div id="chatModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99998;">
        <div style="background:var(--bg-card);border-radius:20px;padding:24px;max-width:400px;width:90%;max-height:80vh;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);overflow:hidden;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
                <div style="font-size:1.3rem;font-weight:700;">Чат поддержки</div>
                <a href="#" onclick="document.getElementById('chatModal').style.display='none'; return false;" style="color:var(--text-secondary);cursor:pointer;text-decoration:none;">
                    <i class="material-icons">close</i>
                </a>
            </div>
            <div class="chat-messages" id="chatMessages" style="flex:1;overflow-y:auto;padding:10px;background:#f8fafc;border-radius:10px;margin-bottom:15px;">
                <div class="chat-message support">
                    <div class="chat-bubble">Здравствуйте! Чем могу помочь?</div>
                </div>
            </div>
            <div style="display:flex;gap:10px;">
                <input type="text" id="chatInput" placeholder="Введите сообщение..." style="flex:1;padding:12px;border:2px solid var(--border);border-radius:25px;font-size:14px;">
                <button class="btn btn-primary" id="chatSendBtn" style="padding:12px 20px;">
                    <i class="material-icons">send</i>
                </button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
